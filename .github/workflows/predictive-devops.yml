name: Predictive DevOps Pipeline

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

jobs:
  predictive-devops:
    name: Analyze and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Write server key
        run: |
          echo "${{ secrets.SF_SERVER_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USERNAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias target-org --set-default

      - name: Get changed Apex files
        id: changed
        shell: bash
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- "*.cls" | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD -- "*.cls" | tr '\n' ',' | sed 's/,$//')
          fi

          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: AI Impact Analysis
        id: ai
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node .github/scripts/ai-impact-analysis.js

      - name: Show AI risk result
        run: |
          echo "AI risk result: ${{ steps.ai.outputs.risk }}"
          echo "Changed files: ${{ steps.changed.outputs.files }}"

      - name: Deploy changed files (LOW or MEDIUM risk)
        if: (steps.ai.outputs.risk == 'LOW' || steps.ai.outputs.risk == 'MEDIUM') && steps.changed.outputs.files != ''
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          echo "Deploy allowed - risk level: ${{ steps.ai.outputs.risk }}"
          echo "Changed files: $CHANGED_FILES"

          IFS=',' read -ra FILES <<< "$CHANGED_FILES"
          for FILE in "${FILES[@]}"; do
            FILE=$(echo "$FILE" | xargs)
            if [ -f "$FILE" ]; then
              echo "Deploying: $FILE"
              sf project deploy start \
                --target-org target-org \
                --source-dir "$FILE" \
                --wait 10
            else
              echo "Skipping missing file: $FILE"
            fi
          done

          echo "All changed files deployed successfully"

      - name: Medium risk warning
        if: steps.ai.outputs.risk == 'MEDIUM'
        run: |
          echo "MEDIUM risk detected — deployment allowed with warning"

      - name: Trigger GirikQA Automation
        if: (steps.ai.outputs.risk == 'LOW' || steps.ai.outputs.risk == 'MEDIUM') && steps.changed.outputs.files != ''
        shell: bash
        env:
          GIRIKQA_WEBHOOK_URL: ${{ secrets.GIRIKQA_WEBHOOK_URL }}
          GIRIKQA_SECRET_KEY: ${{ secrets.GIRIKQA_SECRET_KEY }}
          RISK_LEVEL: ${{ steps.ai.outputs.risk }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          COMMIT_ID: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Triggering GirikQA automation..."

          PAYLOAD=$(cat <<EOF
          {
            "project": "Testing Salesforce",
            "jobType": "TestCase",
            "taskList": ["Girik QA Record"],
            "repository": "$REPOSITORY",
            "commitId": "$COMMIT_ID",
            "branch": "$BRANCH_NAME",
            "riskLevel": "$RISK_LEVEL",
            "changedFiles": "$CHANGED_FILES",
            "triggeredBy": "$ACTOR",
            "triggerSource": "predictive-devops-pipeline",
            "secretKey": "$GIRIKQA_SECRET_KEY"
          }
          EOF
          )

          echo "Sending GirikQA webhook..."
          echo "$PAYLOAD"

          curl -X POST "$GIRIKQA_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "GirikQA automation triggered successfully."

      - name: Block deployment (HIGH or UNKNOWN risk)
        if: steps.ai.outputs.risk == 'HIGH' || steps.ai.outputs.risk == 'UNKNOWN'
        run: |
          echo "HIGH or UNKNOWN risk — deployment BLOCKED"
          exit 1

      - name: No Apex changes detected
        if: steps.changed.outputs.files == ''
        run: |
          echo "No Apex class changes detected. Nothing to analyze or deploy."

      - name: Cleanup key
        if: always()
        run: rm -f server.key